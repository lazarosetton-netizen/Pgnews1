workflows:
  android-workflow:
    name: PGNEWS Final Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: | 
          # Limpa o cache e instala tudo do zero
          npm install --no-package-lock --force
          # Instalação manual da IA para garantir que o Vite a veja
          npm install @google/generative-ai @google/genai
          npm install -g @capacitor/cli
      
      - name: Build web project
        script: |
          # CI=false impede que o build pare por avisos bobos
          CI=false npx vite build
      
      - name: Cap Sync and Add Android
        script: |
          npx cap add android || true
          npx cap sync android
      
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
