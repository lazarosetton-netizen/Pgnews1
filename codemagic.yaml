workflows:
  android-workflow:
    name: PGNEWS Build Final
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: | 
          # Instalando sem o arquivo de trava para evitar loops
          npm install --no-package-lock
          npm install -g @capacitor/cli
      
      - name: Build web project
        script: |
          # CI=false impede que o build pare por causa de avisos pequenos
          CI=false NODE_ENV=production npx vite build
      
      - name: Cap Sync and Add Android
        script: |
          # Garante a criação da pasta android no servidor do Codemagic
          npx cap add android || true
          npx cap sync android
      
      - name: Build Android APK
        script: |
          cd android
          # Comando para compilar o APK ignorando verificações rígidas
          ./gradlew assembleDebug -x lint
    
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
